# Theme that should be used
theme = "archie-zola"

# The URL the site will be built for
base_url = "https://ploliver.github.io"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Title of the webpage
title = "Pau López Oliver"

# Description of the webpage
description = "I'm Pau, a phycisist interested the interplay between QFT and geometry. Here, you will find (potentially) cool stuff I have done."

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false

# Taxonomies, to use tags
taxonomies = [
    {name = "tags", feed = true},
]

[markdown]
# Use CSS classes for syntax highlighting (allows dark mode theming)
highlight_theme = "css"

[extra]
# Put all your custom variables here

# Enabling LaTeX formulae
katex_enable = true

# control dark mode: auto | dark | toggle
mode = "toggle"

# subtitle will show under the title in index page
# subtitle = "Prueba"

# if set true, will use external CDN resource to load font and js file
useCDN = false

favicon = "/icon/favicon32.png"

# show in the footer
copyright = "pau"

# config your Google Analysis ID
# ga = "XXXX-XXXXX"

# config menu and other text
[extra.translations]
[[extra.translations.en]]
show_more = "Read more ⟶"
previous_page = "← Previous"
next_page = "Next →"
posted_on = "on "
posted_by = "Published by"
read_time = "minute read"
all_tags = "All tags"
menus = [
    { name = "Home", url = "/", weight = 2 },
    { name = "All posts", url = "/posts", weight = 2 },
    { name = "About", url = "/about", weight = 3 },
    { name = "Publications", url = "/publications", weight = 4 },
    { name = "Tags", url = "/tags", weight = 5 },
]

# config social icon info in the footer
[[extra.social]]
icon = "github"
name = "GitHub"
url = "https://github.com/ploliver"

[[extra.social]]
icon_file = "orcid.svg"
name = "ORCID"
url = "https://orcid.org/0009-0009-0037-9739"

[[extra.social]]
icon_file = "googlescholar.svg"
name = "Google Scholar"
url = "https://scholar.google.com/citations?hl=en&user=MmwkWZ8AAAAJ"
